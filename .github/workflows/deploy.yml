name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kód
        uses: actions/checkout@v4

      - name: Docker image build
        run: docker build -t pdf-chatbot .

      - name: Docker image mentése tar-ba
        run: docker save pdf-chatbot | gzip > pdf-chatbot.tar.gz

      - name: Fájl feltöltése EC2-re
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "pdf-chatbot.tar.gz"
          target: "~/"

      - name: Deploy EC2-n
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop pdf-chatbot-container 2>/dev/null || true
            docker rm pdf-chatbot-container 2>/dev/null || true
            docker rmi pdf-chatbot 2>/dev/null || true
            docker load < ~/pdf-chatbot.tar.gz
            docker run -d \
              --name pdf-chatbot-container \
              --restart unless-stopped \
              -p 8501:8501 \
              -e HUGGINGFACE_API_KEY=${{ secrets.HUGGINGFACE_API_KEY }} \
              pdf-chatbot
